      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: columnid
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogColumnRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
          description: default response
