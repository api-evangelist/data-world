openapi: 3.1.0
info:
  contact:
    name: Contact Us
    url: https://data.world/company/contact-us
  termsOfService: https://data.world/terms-policies
  title: data.world Public catalog relationships legacy catalog - data API
  version: '0'
  description: Manage relationships between catalog resources
servers:
- url: /v0
security:
- bearerAuth: []
tags:
- name: legacy catalog - data
paths:
  /metadata/data/sources/suggest/{owner}/{sourceid}/tables/{tableid}:
    patch:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: suggestCatalogTable
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogTableSuggestRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
          description: default response
      summary: suggest for an existing table.
      tags:
      - legacy catalog - data
  /metadata/data/sources/{owner}:
    get:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: getDatabases
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - in: query
        name: sort
        schema:
          type: array
          items:
            type: string
      - in: query
        name: size
        schema:
          type: integer
          format: int32
          default: 10
      - in: query
        name: from
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDatabaseResults'
          description: default response
      summary: Gets datasources by owner.
      tags:
      - legacy catalog - data
  /metadata/data/sources/{owner}/{sourceid}:
    get:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: getDatabase
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
          minLength: 1
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseDto'
          description: default response
      summary: Get an individual datasource metadata
      tags:
      - legacy catalog - data
  /metadata/data/sources/{owner}/{sourceid}/tables:
    get:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: getTables
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
          minLength: 1
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: query
        name: typelabel
        schema:
          type: string
      - in: query
        name: typeiri
        schema:
          type: string
      - in: query
        name: sort
        schema:
          type: array
          items:
            type: string
      - in: query
        name: size
        schema:
          type: integer
          format: int32
          default: 10
      - in: query
        name: from
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGenericResultsMetadataResourceDto'
          description: default response
      summary: Get tables for a data source
      tags:
      - legacy catalog - data
    post:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: createCatalogTable
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogTableRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
          description: Table Metadata created successfully.
      summary: Create a new table metadata.
      tags:
      - legacy catalog - data
  /metadata/data/sources/{owner}/{sourceid}/tables/iri/{tableiri}:
    patch:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: patchCatalogTableByIri
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableiri
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogTableRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
          description: default response
      summary: Update an existing table identified by IRI.
      tags:
      - legacy catalog - data
  /metadata/data/sources/{owner}/{sourceid}/tables/{tableid}:
    delete:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: deleteCatalogTable
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
          description: default response
      summary: Delete a table.
      tags:
      - legacy catalog - data
    get:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: getTable
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
          minLength: 1
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      - in: query
        name: schema
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataResourceDto'
          description: default response
      summary: Get an individual table metadata
      tags:
      - legacy catalog - data
    patch:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: patchCatalogTable
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      - in: query
        name: schema
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogTableRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
          description: default response
      summary: Update an existing table.
      tags:
      - legacy catalog - data
    put:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: replaceCatalogTable
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogTableRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
          description: default response
      summary: Replace an existing table
      tags:
      - legacy catalog - data
  /metadata/data/sources/{owner}/{sourceid}/tables/{tableid}/columns:
    get:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: getTableColumns
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
          minLength: 1
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      - in: query
        name: sort
        schema:
          type: array
          items:
            type: string
      - in: query
        name: size
        schema:
          type: integer
          format: int32
          default: 10
      - in: query
        name: from
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGenericResultsMetadataResourceDto'
          description: default response
      summary: Get columns for a given table
      tags:
      - legacy catalog - data
    post:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: createCatalogColumn
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogColumnRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateResponse'
          description: Column Metadata created successfully.
      summary: Create a Column.
      tags:
      - legacy catalog - data
  /metadata/data/sources/{owner}/{sourceid}/tables/{tableid}/columns/{columnid}:
    delete:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: deleteCatalogColumn
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: columnid
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
          description: default response
      summary: Delete a Column.
      tags:
      - legacy catalog - data
    get:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: getTableColumn
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
          minLength: 1
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: columnid
        required: true
        schema:
          type: string
          minLength: 1
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetadataResourceDto'
          description: default response
      summary: Get an individual column metadata
      tags:
      - legacy catalog - data
    patch:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: patchCatalogColumn
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - description: database source id
        in: path
        name: sourceid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: tableid
        required: true
        schema:
          type: string
          minLength: 1
      - in: path
        name: columnid
        required: true
        schema:
          type: string
          minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogColumnRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
          description: default response
      summary: Update an existing Column.
      tags:
      - legacy catalog - data
    put:
      description: Please refer to the updated IRI-based resource endpoints.
      operationId: replaceCatalogColumn
      parameters:
      - description: id of the user or organization
        in: path
        name: owner
        required: true
        schema:
          type: string
      - description: database source id
        in: path
